<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Briefing recibido | GAMO Agencia Creativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--violet:#351D48;--green:#68B98C;--soft:#f4f0f7;--line:#e7e0ec;--ink:#17121d}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 0%,rgba(104,185,140,.38),transparent 30%),linear-gradient(135deg,#fff,#faf6fd);font-family:"IBM Plex Sans",system-ui,sans-serif;color:var(--ink);padding:24px}
    .card{max-width:720px;background:#fff;border:1px solid var(--line);border-radius:34px;padding:42px;box-shadow:0 18px 60px rgba(53,29,72,.16)}
    .mark{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--violet),#5b3772);display:grid;place-items:center;color:#fff;font-family:"IBM Plex Mono";font-weight:700;margin-bottom:22px}
    h1{margin:0 0 16px;color:var(--violet);font-size:42px;letter-spacing:-.05em;line-height:1}
    p{color:#6d6575;font-size:18px;line-height:1.7;margin:0 0 24px}
    a{display:inline-flex;border-radius:999px;background:var(--green);color:#102016;text-decoration:none;font-weight:700;padding:14px 20px}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">G</div>
    <h1>Briefing recibido.</h1>
    <p>Gracias por completar el briefing corporativo de RC Project. Con esta información, GAMO Agencia Creativa podrá iniciar el desarrollo de las tres propuestas iniciales de identidad visual.</p>
    <a href="./index.html">Volver al formulario</a>
  </main>
</body>
</html>
